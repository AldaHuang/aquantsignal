<!-- v2 -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>aquant</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<style>
  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --text: #c8c8c8;
    --text-dim: #666;
    --accent: #f0a030;
    --green: #00c853;
    --red: #ff3d3d;
    --blue: #448aff;
    --font-mono: 'SF Mono','Cascadia Code','Fira Code',monospace;
    --font-sans: -apple-system,'Helvetica Neue',sans-serif;
    --radius: 6px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:var(--font-sans);
    background:var(--bg);
    color:var(--text);
    padding:10px 14px 40px;
    max-width:460px;
    margin:0 auto;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  /* Header */
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 0 6px;
    border-bottom:1px solid var(--border);
    margin-bottom:10px;
  }
  .logo{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.3px}
  .logo span{color:var(--accent)}
  .clock{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-dim);
    text-align:right;
    line-height:1.3;
  }
  .clock .time{color:var(--accent);font-size:13px;font-weight:600}

  /* Stats bar */
  .stats-bar{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin:8px 0 12px;
  }
  .stat{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:8px 10px;
    text-align:center;
  }
  .stat .val{font-family:var(--font-mono);font-size:15px;font-weight:700;color:#fff}
  .stat .val.up{color:var(--red)}
  .stat .val.down{color:var(--green)}
  .stat .lbl{font-size:10px;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}

  /* Tabs */
  .tabs{
    display:flex;
    gap:4px;
    margin:10px 0;
    background:var(--surface);
    border-radius:var(--radius);
    padding:3px;
  }
  .tabs button{
    flex:1;
    padding:9px 0;
    border:none;
    border-radius:4px;
    background:transparent;
    color:var(--text-dim);
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    transition:all .15s;
    font-family:var(--font-sans);
  }
  .tabs button.on{
    background:var(--surface2);
    color:#fff;
    font-weight:600;
    box-shadow:0 1px 3px rgba(0,0,0,.3);
  }

  /* Cards */
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:12px;
    margin:6px 0;
  }
  .card .top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:6px;
  }
  .card .stock-name{font-size:16px;font-weight:600;color:#fff}
  .card .stock-code{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-left:6px}
  .card .stock-price{font-family:var(--font-mono);font-size:16px;font-weight:600;color:#fff;white-space:nowrap}

  .card .mid{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:4px;
  }
  .card .score{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-dim);
  }
  .card .score strong{color:var(--accent);font-size:14px}

  /* Tags */
  .tag{
    display:inline-block;
    padding:3px 9px;
    border-radius:3px;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.5px;
    text-transform:uppercase;
  }
  .tag-buy{background:rgba(255,61,61,.15);color:var(--red)}
  .tag-sell{background:rgba(0,200,83,.12);color:var(--green)}
  .tag-watch{background:rgba(240,160,48,.12);color:var(--accent)}
  .tag-hold{background:rgba(255,255,255,.06);color:var(--text-dim)}

  .reason{
    font-size:12px;
    color:var(--text-dim);
    line-height:1.6;
    margin-top:6px;
    padding-top:6px;
    border-top:1px solid rgba(255,255,255,.04);
  }

  .trade-info{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--accent);
    margin-top:6px;
    line-height:1.7;
    padding:6px 8px;
    background:rgba(240,160,48,.04);
    border-radius:4px;
    border-left:2px solid var(--accent);
  }

  /* Plan table */
  .plan-table{width:100%;border-collapse:collapse;font-family:var(--font-mono)}
  .plan-table th{
    font-size:10px;
    color:var(--text-dim);
    text-align:left;
    padding:6px 5px;
    border-bottom:1px solid var(--border);
    text-transform:uppercase;
    letter-spacing:0.5px;
    font-weight:500;
  }
  .plan-table td{
    font-size:12px;
    padding:7px 5px;
    border-bottom:1px solid rgba(255,255,255,.04);
    color:var(--text);
  }
  .plan-table .sl{color:var(--red)}
  .plan-table .tp{color:var(--green)}

  /* Paper trading */
  .equity-big{
    font-family:var(--font-mono);
    font-size:32px;
    font-weight:700;
    color:#fff;
    line-height:1;
  }
  .metric-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px 20px;
    margin:8px 0;
    font-size:13px;
  }
  .metric-row .ml{color:var(--text-dim)}
  .metric-row .mv{font-family:var(--font-mono);text-align:right}

  /* Trade history */
  .trade-item{
    padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,.03);
    font-size:12px;
  }
  .trade-item .tl{display:flex;justify-content:space-between;margin-bottom:2px}
  .trade-item .td{font-size:10px;color:var(--text-dim);font-family:var(--font-mono)}

  /* Log */
  .log-section h4{
    font-size:12px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin:12px 0 6px;
    font-weight:500;
  }
  .weight-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
    font-family:var(--font-mono);
    font-size:13px;
  }
  .weight-row .bar-wrap{
    flex:1;
    margin:0 10px;
    height:4px;
    background:var(--surface2);
    border-radius:2px;
    overflow:hidden;
  }
  .weight-row .bar-fill{
    height:100%;
    border-radius:2px;
    background:var(--accent);
    transition:width .3s;
  }

  .empty{
    text-align:center;
    color:var(--text-dim);
    padding:40px 20px;
    font-size:13px;
    line-height:1.8;
  }
  .empty .emoji{font-size:32px;margin-bottom:8px}

  .footer{
    text-align:center;
    color:#444;
    font-size:10px;
    padding:24px 0 12px;
    font-family:var(--font-mono);
  }

  .error-banner{
    background:rgba(255,61,61,.08);
    border:1px solid rgba(255,61,61,.2);
    border-radius:var(--radius);
    padding:10px 14px;
    margin:8px 0;
    font-size:12px;
    color:var(--red);
    display:none;
  }
  .error-banner.show{display:block}

  @media (prefers-color-scheme:light){
    :root{
      --bg:#f5f5f5;
      --surface:#fff;
      --surface2:#eee;
      --border:#e0e0e0;
      --text:#333;
      --text-dim:#999;
      --accent:#d47800;
      --green:#009944;
      --red:#d42a2a;
    }
    .card .stock-name,.card .stock-price,.logo,.stat .val,.equity-big{color:#111}
    .tabs button.on{color:#111}
    .reason{border-top-color:rgba(0,0,0,.05)}
    .trade-info{background:rgba(212,120,0,.06)}
    .plan-table td{border-bottom-color:rgba(0,0,0,.03)}
    .trade-item{border-bottom-color:rgba(0,0,0,.03)}
    .tag-hold{background:rgba(0,0,0,.06);color:#999}
  }
  /* ── Changelog ── */
  .clog-day{background:var(--card-bg);border-radius:10px;padding:10px 14px;margin:10px 0;border:1px solid var(--border)}
  .clog-date{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .clog-section{margin:6px 0}
  .clog-sub{font-size:12px;font-weight:600;color:#ddd;margin:8px 0 4px;text-transform:uppercase;letter-spacing:0.3px}
  .clog-item{font-size:11px;color:var(--text-dim);padding:3px 0 3px 10px;border-left:2px solid var(--border);margin:2px 0;line-height:1.6}
  .clog-add{border-left-color:var(--red);background:rgba(192,57,43,.06)}
  .clog-remove{border-left-color:var(--green);background:rgba(39,174,96,.06)}
  .clog-stay{border-left-color:var(--accent);background:rgba(212,120,0,.06)}
  .clog-bold{font-size:12px;font-weight:600;color:#eee;padding:4px 0}
  .clog-tbl{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);padding:1px 0;white-space:pre-wrap}
  .clog-text{font-size:11px;color:#999;padding:2px 0;line-height:1.6}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span>◆</span> aquant</div>
  <div class="clock">
    <div class="time" id="clock-time">--:--</div>
    <div id="clock-date">----.--.--</div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="val" id="stat-buys">--</div>
    <div class="lbl">买入信号</div>
  </div>
  <div class="stat">
    <div class="val" id="stat-sells">--</div>
    <div class="lbl">卖出信号</div>
  </div>
  <div class="stat">
    <div class="val" id="stat-score">--</div>
    <div class="lbl">最高评分</div>
  </div>
</div>

<div class="error-banner" id="error-banner"></div>

<div class="tabs">
  <button class="on" data-tab="recommend">推荐</button>
  <button data-tab="plan">交易指令</button>
  <button data-tab="paper">模拟盘</button>
  <button data-tab="log">日志</button>
</div>

<div id="tab-recommend" class="tab-content"></div>
<div id="tab-plan" class="tab-content" style="display:none"></div>
<div id="tab-paper" class="tab-content" style="display:none"></div>
<div id="tab-log" class="tab-content" style="display:none"></div>

<div class="footer">自动生成 · 仅供参考 · 不构成投资建议</div>

<script>
(function(){
  'use strict';
  let data = null;
  let loadError = null;

  // Clock
  function tick(){
    var d = new Date();
    document.getElementById('clock-time').textContent =
      d.toTimeString().slice(0,5);
    document.getElementById('clock-date').textContent =
      d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  tick(); setInterval(tick, 10000);

  // Tabs
  document.querySelector('.tabs').addEventListener('click', function(e){
    var btn = e.target.closest('button');
    if (!btn) return;
    var name = btn.dataset.tab;
    this.querySelectorAll('button').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
    document.querySelectorAll('.tab-content').forEach(function(t){t.style.display='none';});
    var el = document.getElementById('tab-'+name);
    if (el) el.style.display='';
  });

  // Error display
  function showError(msg){
    var b = document.getElementById('error-banner');
    b.textContent = '⚠ '+msg;
    b.classList.add('show');
  }
  function hideError(){
    document.getElementById('error-banner').classList.remove('show');
  }

  // Load data
  async function load(){
    try {
      var r = await fetch('reports/tracker.json?t='+Date.now(), {cache:'no-cache'});
      if (!r.ok) throw new Error('HTTP '+r.status);
      data = await r.json();
      hideError();
      render();
    } catch(e){
      loadError = e;
      showError('数据加载失败：'+e.message);
      renderFallback();
    }
  }

  function renderFallback(){
    ['recommend','plan','paper','log'].forEach(function(tab){
      document.getElementById('tab-'+tab).innerHTML =
        '<div class="empty"><div class="emoji">📡</div>暂无数据<br><span style="font-size:11px">请运行 ./run_daily.sh 生成报告</span></div>';
    });
    document.getElementById('stat-buys').textContent = '--';
    document.getElementById('stat-sells').textContent = '--';
    document.getElementById('stat-score').textContent = '--';
  }

  function render(){
    if (!data) return renderFallback();
    var recs = data.records || [];
    if (!recs.length) return renderFallback();
    var latest = recs[recs.length-1];
    var picks = latest.picks || [];

    // Stats bar
    var buys = picks.filter(function(p){return p.verdict==='买入'||p.verdict==='关注';});
    var sells = picks.filter(function(p){return p.verdict==='卖出';});
    var maxScore = picks.length ? Math.max.apply(null, picks.map(function(p){return p.score||0;})) : 0;
    document.getElementById('stat-buys').textContent = buys.length||'0';
    document.getElementById('stat-sells').textContent = sells.length||'0';
    document.getElementById('stat-score').textContent = maxScore||'0';

    // Recommend tab
    var html = '';
    picks.forEach(function(p){
      var verdict = p.verdict||'观望';
      var tagClass = verdict==='买入'?'tag-buy':verdict==='卖出'?'tag-sell':verdict==='关注'?'tag-watch':'tag-hold';
      var reasons = (p.reasons||[]).filter(function(r){return !r.startsWith('止损');}).slice(0,3).join(' · ');
      html += '<div class="card">'+
        '<div class="top"><span class="stock-name">'+esc(p.name)+'<span class="stock-code">'+esc(p.symbol)+'</span></span>'+
        '<span class="stock-price">¥'+(p.price||0).toFixed(2)+'</span></div>'+
        '<div class="mid"><span class="score">评分 <strong>'+(p.score||0)+'</strong>/100</span>'+
        '<span class="tag '+tagClass+'">'+esc(verdict)+'</span></div>'+
        '<div class="reason">'+esc(reasons||'暂无理由')+'</div>';
      if (p.stop_loss && p.stop_loss>0){
        html += '<div class="trade-info">'+
          '止损 ¥'+p.stop_loss.toFixed(2)+' ｜ 止盈 ¥'+(p.take_profit||0).toFixed(2)+' ｜ '+
          '仓位 '+(p.position_pct||0)+'% ｜ 风险 '+(p.risk_pct||0).toFixed(1)+'%</div>';
      }
      html += '</div>';
    });
    document.getElementById('tab-recommend').innerHTML = html || '<div class="empty">暂无推荐</div>';

    // Plan tab
    var buyPlans = picks.filter(function(p){
      return (p.verdict==='买入'||p.verdict==='关注') && p.stop_loss>0;
    });
    if (buyPlans.length){
      html = '<table class="plan-table">'+
        '<tr><th>股票</th><th>买入</th><th>止损</th><th>止盈</th><th>仓位</th><th>风险</th></tr>';
      buyPlans.forEach(function(p){
        html += '<tr><td>'+esc(p.name)+'</td><td>¥'+(p.entry||p.price||0).toFixed(2)+'</td>'+
          '<td class="sl">¥'+(p.stop_loss||0).toFixed(2)+'</td>'+
          '<td class="tp">¥'+(p.take_profit||0).toFixed(2)+'</td>'+
          '<td>'+(p.position_pct||0)+'%</td><td>'+(p.risk_pct||0).toFixed(1)+'%</td></tr>';
      });
      html += '</table>';
    } else {
      html = '<div class="empty"><div class="emoji">📋</div>暂无买入信号<br><span style="font-size:11px">等待推荐引擎生成交易计划</span></div>';
    }
    document.getElementById('tab-plan').innerHTML = html;

    // Paper tab
    var pp = data.paper || {};
    if (pp.equity){
      var ret = ((pp.equity - (pp.initial_cash||0)) / (pp.initial_cash||1) * 100);
      var retColor = ret>=0?'var(--red)':'var(--green)';
      html = '<div class="card">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
        '<span style="color:var(--text-dim);font-size:12px">总资产</span>'+
        '<span class="equity-big" style="color:'+retColor+'">¥'+(pp.equity||0).toFixed(2)+'</span></div>'+
        '<div class="metric-row">'+
        '<span class="ml">初始资金</span><span class="mv">¥'+((pp.initial_cash||0)).toFixed(2)+'</span>'+
        '<span class="ml">收益率</span><span class="mv" style="color:'+retColor+'">'+ret.toFixed(2)+'%</span>'+
        '<span class="ml">可用现金</span><span class="mv">¥'+((pp.cash||0)).toFixed(2)+'</span>'+
        '<span class="ml">当前持仓</span><span class="mv">'+(pp.positions||0)+' 只</span>'+
        '<span class="ml">累计交易</span><span class="mv">'+(pp.total_trades||0)+' 笔</span>'+
        '</div></div>';
      // Positions
      if (pp.positions_list && pp.positions_list.length){
        html += '<h4 style="font-size:12px;color:var(--text-dim);margin:12px 0 6px">持仓</h4>';
        pp.positions_list.forEach(function(p){
          var pc = (p.pnl_pct||0)>=0?'var(--red)':'var(--green)';
          html += '<div class="trade-item">'+
            '<div class="tl"><span style="font-weight:600">'+esc(p.name||p.symbol)+'</span><span style="font-size:11px;color:var(--text-dim)">'+(p.shares||0)+'股</span></div>'+
            '<div class="td">成本 ¥'+(p.avg_cost||0).toFixed(2)+' → 现价 ¥'+(p.current_price||0).toFixed(2)+' | 市值 ¥'+(p.market_value||0).toFixed(2)+' | <span style="color:'+pc+'">'+(p.pnl_pct>0?'+':'')+(p.pnl_pct||0).toFixed(2)+'%</span></div>'+
            '<div class="td" style="font-size:10px">止损 ¥'+(p.stop_loss||0).toFixed(2)+' | 入场 '+esc(p.entry_date||'')+'</div>'+
            '</div>';
        });
      }
      // Closed trades
      if (pp.history && pp.history.length){
        html += '<h4 style="font-size:12px;color:var(--text-dim);margin:12px 0 6px">已平仓</h4>';
        pp.history.slice(-5).reverse().forEach(function(t){
          var c = (t.pnl||0)>=0?'var(--red)':'var(--green)';
          html += '<div class="trade-item">'+
            '<div class="tl"><span style="font-weight:600">'+esc(t.name||t.symbol)+'</span>'+
            '<span style="font-family:var(--font-mono);color:'+c+'">¥'+(t.pnl>0?'+':'')+(t.pnl||0).toFixed(2)+' ('+(t.pnl_pct||0)+'%)</span></div>'+
            '<div class="td">'+(t.side==='buy'?'买':'卖')+' '+(t.shares||0)+'股 | 买¥'+(t.entry_price||0).toFixed(2)+' 卖¥'+(t.exit_price||0).toFixed(2)+' | 佣金¥'+(t.commission||0).toFixed(2)+' 印花税¥'+(t.stamp_duty||0).toFixed(2)+'</div>'+
            '<div class="td" style="font-size:10px">'+esc(t.exit_date||t.entry_date||'')+' | '+esc(t.reason||'')+'</div>'+
            '</div>';
        });
      }
      // Order log
      if (pp.order_log && pp.order_log.length){
        html += '<h4 style="font-size:12px;color:var(--text-dim);margin:12px 0 6px">操作日志</h4>';
        pp.order_log.slice(-10).reverse().forEach(function(o){
          var icons = {ORDER_CREATED:'📝', ORDER_FILLED:'✅', ORDER_FAILED:'❌'};
          html += '<div style="font-size:10px;color:var(--text-dim);padding:2px 4px;line-height:1.7;border-bottom:1px solid var(--border)">'+(icons[o.event]||'📌')+' '+esc(o.time||'')+' <b>'+esc(o.event||'')+'</b> '+esc(o.name||o.symbol||'')+' '+(o.side||'')+' '+(o.shares||'')+'股 @ ¥'+(o.price||o.target_price||0).toFixed(2)+' '+(o.commission?'佣金¥'+o.commission.toFixed(2):'')+' '+esc(o.reason||'')+'</div>';
        });
      }
      document.getElementById('tab-paper').innerHTML = html;
    } else {
      document.getElementById('tab-paper').innerHTML =
        '<div class="empty"><div class="emoji">📈</div>模拟盘数据收集中...<br><span style="font-size:11px">系统运行 2 次以上后开始显示</span></div>';
    }

    // Log tab: strategy weights + full changelog
    var weights = data.strategy_weights || {};
    html = '<div class="log-section"><h4>策略权重</h4>';
    Object.keys(weights).sort().forEach(function(k){
      var w = weights[k];
      var pct = Math.round(w/1.5*100);
      html += '<div class="weight-row"><span>'+esc(k)+'</span>'+
        '<span class="bar-wrap"><span class="bar-fill" style="width:'+pct+'%"></span></span>'+
        '<span style="font-size:12px">'+w.toFixed(2)+'</span></div>';
    });
    html += '</div>';

    var pnl = data.strategy_pnl || {};
    if (Object.keys(pnl).length){
      html += '<div class="log-section"><h4>策略盈亏</h4>';
      Object.keys(pnl).sort().forEach(function(k){
        var v = pnl[k];
        var c = v>=0?'var(--red)':'var(--green)';
        html += '<div class="weight-row"><span>'+esc(k)+'</span><span style="font-family:var(--font-mono);color:'+c+'">¥'+v.toFixed(2)+'</span></div>';
      });
      html += '</div>';
    }

    // Market regime
    var mr = data.market_regime || {};
    if (mr.regime){
      var rlabel = {trending:'📈 趋势市', ranging:'📊 震荡市', mixed:'➖ 混合市'};
      html += '<div class="log-section"><h4>市场状态</h4>';
      html += '<div style="font-size:13px;padding:4px 0">'+(rlabel[mr.regime]||mr.regime)+' (强度:'+(mr.strength||50)+')</div>';
      html += '</div>';
    }

    // Full changelog — render with structure
    var clog = data.changelog || '';
    if (clog){
      html += '<div class="log-section"><h4>更新日志</h4>';
      // Split by date headers
      var sections = clog.split(/\n(?=## \d{4}-\d{2}-\d{2})/);
      for (var si=0; si<Math.min(sections.length, 10); si++){
        var sec = sections[si];
        if (!sec.trim()) continue;
        var secLines = sec.split('\n');
        var dateHeading = '';
        if (secLines[0] && secLines[0].indexOf('## ')==0) dateHeading = secLines[0].slice(3);

        html += '<div class="clog-day">';
        if (dateHeading) html += '<div class="clog-date">📅 '+esc(dateHeading)+'</div>';

        var sub = ''; // current sub-section
        for (var li=1; li<secLines.length; li++){
          var l = secLines[li];
          // Section headers
          if (l.indexOf('### ')==0){
            if (sub) html += '</div>';
            sub = esc(l.slice(4));
            html += '<div class="clog-section"><div class="clog-sub">'+sub+'</div>';
            continue;
          }
          if (l.indexOf('---')===0) continue;
          // Bullet items
          if (l.indexOf('- ')>=0 && l.indexOf('- ')<3){
            var txt = l.replace(/^- /,'').trim();
            // Color code adds/removes
            var itemClass = 'clog-item';
            if (txt.indexOf('🔴')>=0 || txt.indexOf('新增')>=0) itemClass += ' clog-add';
            else if (txt.indexOf('🟢')>=0 || txt.indexOf('移除')>=0) itemClass += ' clog-remove';
            else if (txt.indexOf('持续')>=0) itemClass += ' clog-stay';
            html += '<div class="'+itemClass+'">'+esc(txt)+'</div>';
            continue;
          }
          // Bold text lines
          if (l.indexOf('**')>=0){
            html += '<div class="clog-bold">'+esc(l).replace(/\*\*/g,'')+'</div>';
            continue;
          }
          // Table rows
          if (l.indexOf('|')===0){
            html += '<div class="clog-tbl">'+esc(l).replace(/\|/g,' ')+'</div>';
            continue;
          }
          // Plain text
          if (l.trim()){
            html += '<div class="clog-text">'+esc(l)+'</div>';
          }
        }
        if (sub) html += '</div>'; // close last sub-section
        html += '</div>'; // close day
      }
      html += '</div>';
    }

    document.getElementById('tab-log').innerHTML = html;
  }

  function esc(s){
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  load();
})();
</script>
</body>
</html>
